name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^# Version:' zen_mtp.koplugin/payload/ZenMTP/ZenMTP.sh | awk '{print $3}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Zip KOReader plugin
        run: zip -r "zen_mtp.koplugin-v${{ steps.version.outputs.version }}.zip" zen_mtp.koplugin/

      - name: Zip standalone ZenMTP scripts
        run: |
          cd zen_mtp.koplugin/payload
          zip -r "../../ZenMTP-v${{ steps.version.outputs.version }}.zip" ZenMTP/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            zen_mtp.koplugin-v${{ steps.version.outputs.version }}.zip
            ZenMTP-v${{ steps.version.outputs.version }}.zip
